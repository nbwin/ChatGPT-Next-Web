name: Build ssr-plus IPK for AX6000

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出当前仓库
      uses: actions/checkout@v4

    - name: 初始化编译环境并清理磁盘
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 🛡️ 挂载 10GB 虚拟内存 (防 OOM 杀进程)
      run: |
        sudo swapoff /swapfile || true
        sudo rm -f /swapfile
        sudo dd if=/dev/zero of=/swapfile bs=1M count=10240
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: 拉取 OpenWrt 源码
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: 添加 helloworld 插件源并安装 feeds
      working-directory: /workdir/openwrt
      run: |
        echo "src-git helloworld https://github.com/fw876/helloworld.git" >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 注入红米 AX6000 架构并设为模块编译 (M)
      working-directory: /workdir/openwrt
      run: |
        cat >> .config <<EOF
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_mt7986=y
        CONFIG_TARGET_mediatek_mt7986_DEVICE_xiaomi_redmi-router-ax6000=y
        # =m 代表仅编译为独立的 .ipk 安装包
        CONFIG_PACKAGE_luci-app-ssr-plus=m
        EOF
        make defconfig

    - name: 下载编译所需的代码与依赖包
      working-directory: /workdir/openwrt
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 🧱 预编译底层工具、工具链与内核 (打好所有地基)
      working-directory: /workdir/openwrt
      run: |
        # 1. 编译基础工具
        make tools/compile -j$(nproc) || make tools/compile -j1 V=s
        # 2. 编译交叉工具链
        make toolchain/compile -j$(nproc) || make toolchain/compile -j1 V=s
        # 3. 💡 新增：编译目标平台的 Linux 内核，彻底解决 cryptodev 等 kmod 依赖报错
        make target/compile -j$(nproc) || make target/compile -j1 V=s

    - name: 🚀 仅编译插件及其全部依赖 (稳如老狗版)
      working-directory: /workdir/openwrt
      run: |
        make package/luci-app-ssr-plus/compile -j$(nproc) || make package/luci-app-ssr-plus/compile -j1 V=s

    - name: 📦 收集所有生成的 IPK 文件
      id: organize
      working-directory: /workdir/openwrt
      run: |
        mkdir -p /workdir/ipk_output
        find bin/packages/ -name "*.ipk" -exec cp {} /workdir/ipk_output/ \;
        find bin/targets/ -name "*.ipk" -exec cp {} /workdir/ipk_output/ \;
        echo "IPK_DIR=/workdir/ipk_output" >> $GITHUB_ENV

    - name: ☁️ 上传 IPK 安装包至 GitHub
      uses: actions/upload-artifact@v4
      with:
        name: ssr-plus_and_dependencies_AX6000
        path: ${{ env.IPK_DIR }}
